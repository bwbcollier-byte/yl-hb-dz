name: Deezer Social Profile Enrichment

on:
  schedule:
    # Run daily at 3 AM UTC (2 PM AEDT)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      record_limit:
        description: "Number of records to process (leave empty for all)"
        required: false
        default: ""
        type: string

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run Deezer Social Enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RAPIDAPI_KEY_1: ${{ secrets.RAPIDAPI_KEY_1 }}
          RAPIDAPI_KEY_2: ${{ secrets.RAPIDAPI_KEY_2 }}
          RAPIDAPI_KEY_3: ${{ secrets.RAPIDAPI_KEY_3 }}
          RAPIDAPI_KEY_4: ${{ secrets.RAPIDAPI_KEY_4 }}
          RAPIDAPI_KEY_5: ${{ secrets.RAPIDAPI_KEY_5 }}
          RAPIDAPI_KEY_6: ${{ secrets.RAPIDAPI_KEY_6 }}
          RAPIDAPI_KEY_7: ${{ secrets.RAPIDAPI_KEY_7 }}
          RAPIDAPI_KEY_8: ${{ secrets.RAPIDAPI_KEY_8 }}
          RAPIDAPI_KEY_9: ${{ secrets.RAPIDAPI_KEY_9 }}
          RAPIDAPI_KEY_10: ${{ secrets.RAPIDAPI_KEY_10 }}
          LIMIT: ${{ github.event.inputs.record_limit }}
          CI: "true"
        run: node dist/deezer-social-enrichment.js

      - name: Report status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deezer Social Enrichment completed successfully"
          else
            echo "❌ Deezer Social Enrichment failed"
          fi
